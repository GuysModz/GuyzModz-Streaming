<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - GuyzModz Stream</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .player-page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 120px;
            padding-bottom: 40px;
        }
        .player-title-header {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 1.5rem;
            font-weight: 600;
            transition: var(--transition);
            background: rgba(255,255,255,0.05);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }
        .back-btn:hover {
            color: white;
            background: rgba(255,255,255,0.1);
            border-color: var(--primary-color);
        }
        .iframe-container {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            background: black;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            border: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <header class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-play"></i> GuyzModz<span>Stream</span>
        </div>
    </header>

    <main class="player-page-container container">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        
        <h1 id="page-player-title" class="player-title-header">Loading Player...</h1>
        
        <div class="iframe-container" id="page-iframe-container">
            <div style="color:var(--text-muted); display:flex; justify-content:center; align-items:center; height:100%; font-size: 1.2rem;">
                <i class="fa-solid fa-spinner fa-spin" style="margin-right: 10px;"></i> Initializing Player...
            </div>
        </div>
        
        <div id="page-tv-controls" class="tv-controls hidden" style="margin-top: 2rem;">
            <div class="control-group">
                <label for="page-season-select">Season:</label>
                <select id="page-season-select">
                    <option>Loading...</option>
                </select>
            </div>
            <div class="control-group">
                <label for="page-episode-select">Episode:</label>
                <select id="page-episode-select">
                    <option>Loading...</option>
                </select>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 GuyzModz Stream. All rights reserved.</p>
        <p class="disclaimer">This site does not store any files on its server. All contents are provided by non-affiliated third parties.</p>
    </footer>

    <script src="player.js"></script>
</body>
</html>
