<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - GuyzModz Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-color: #8b5cf6;
            --bg-color: #0a0a0f;
            --glass-border: rgba(255,255,255,0.08);
            --text-muted: rgba(255,255,255,0.5);
            --transition: all 0.3s ease;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* ─── Fullscreen wrapper ─── */
        #fullscreen-player {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1;
        }

        /* The actual video / iframe fills 100% */
        #fullscreen-player iframe,
        #fullscreen-player video {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ─── Overlay controls (auto-hide) ─── */
        #player-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #player-overlay.hidden {
            opacity: 0;
        }

        /* Top bar */
        #overlay-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 1.2rem 1.8rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            pointer-events: all;
        }

        #back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            background: rgba(255,255,255,0.1);
            padding: 0.45rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
            transition: var(--transition);
            pointer-events: all;
        }
        #back-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

        #overlay-title {
            font-size: 1.2rem;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            opacity: 0.9;
        }

        #overlay-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        /* Bottom bar - TV controls */
        #overlay-bottom {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 1.5rem 2rem;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            pointer-events: all;
        }

        #overlay-bottom.hidden-controls {
            display: none;
        }

        .control-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-right: 0.3rem;
        }

        .player-select {
            background: rgba(20,20,30,0.9);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 0.45rem 0.8rem;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: var(--transition);
        }
        .player-select:hover { border-color: var(--primary-color); }
        .player-select option { background: #0a0a0f; }

        /* Cursor hidden when overlay is hidden */
        body.hide-cursor { cursor: none; }

        /* Loading state */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            z-index: 20;
            transition: opacity 0.5s ease;
        }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        #loading-screen i { font-size: 2.5rem; color: var(--primary-color); }
        #loading-screen span { color: var(--text-muted); font-size: 1rem; }
    </style>
</head>
<body>

    <!-- Loading screen -->
    <div id="loading-screen">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <span>Loading Player...</span>
    </div>

    <!-- Fullscreen player -->
    <div id="fullscreen-player"></div>

    <!-- Overlay (auto-hides) -->
    <div id="player-overlay">
        <!-- Top: back + title -->
        <div id="overlay-top">
            <a id="back-btn" href="index.html"><i class="fa-solid fa-arrow-left"></i> Back</a>
            <div>
                <div id="overlay-title">Loading...</div>
                <div id="overlay-subtitle"></div>
            </div>
        </div>

        <!-- Bottom: season/episode controls (TV only) -->
        <div id="overlay-bottom" class="hidden-controls">
            <span class="control-label">Season</span>
            <select id="season-select" class="player-select"></select>
            <span class="control-label">Episode</span>
            <select id="episode-select" class="player-select"></select>
        </div>
    </div>

    <script src="player.js"></script>
</body>
</html>
